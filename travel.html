<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>travel | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas class="snow-canvas" aria-hidden="true"></canvas>
    <header class="site-header">
      <a class="brand" href="index.html">Portfolio</a>
      <nav class="site-nav" aria-label="メインナビゲーション">
        <a href="about.html">about</a>
        <a href="works.html">works</a>
        <a class="is-active" href="travel.html">travel</a>
        <a href="dog.html">dog</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="section gallery-section">
        <div class="section-heading reveal">
          <p class="eyebrow">Travel</p>
          <h1>旅行写真記録</h1>
        </div>
        <div class="photo-grid travel-grid">
          <button class="photo-card reveal" type="button" data-caption="夜の駅に積もる雪。静かな光がきれいだった一枚。">
            <img src="assets/hokkaido-hero.jpg" alt="北海道旅行写真 1" />
          </button>
          <button class="photo-card reveal" type="button" data-caption="ホームの明かりと雪の白さが重なった景色。">
            <img src="assets/hokkaido-hero.jpg" alt="北海道旅行写真 2" />
          </button>
          <button class="photo-card reveal" type="button" data-caption="旅先で見つけた、冬らしいやわらかな色。">
            <img src="assets/hokkaido-hero.jpg" alt="北海道旅行写真 3" />
          </button>
          <button class="photo-card reveal" type="button" data-caption="冷たい空気の中で残した、思い出の風景。">
            <img src="assets/hokkaido-hero.jpg" alt="北海道旅行写真 4" />
          </button>
          <button class="photo-card reveal" type="button" data-caption="雪が降る瞬間の奥行きと光。">
            <img src="assets/hokkaido-hero.jpg" alt="北海道旅行写真 5" />
          </button>
          <button class="photo-card reveal" type="button" data-caption="また見返したくなる、旅のワンシーン。">
            <img src="assets/hokkaido-hero.jpg" alt="北海道旅行写真 6" />
          </button>
        </div>
      </section>
    </main>

    <dialog class="photo-dialog" aria-label="写真の説明">
      <button class="dialog-close" type="button" aria-label="閉じる">×</button>
      <p></p>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
