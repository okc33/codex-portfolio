<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>travel | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Noto+Sans+JP:wght@400;500;700&family=Nunito:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas class="snow-canvas" aria-hidden="true"></canvas>
    <header class="site-header">
      <a class="brand" href="index.html">Portfolio</a>
      <nav class="site-nav" aria-label="メインナビゲーション">
        <a href="about.html">about</a>
        <a href="works.html">works</a>
        <a class="is-active" href="travel.html">travel</a>
        <a href="dog.html">dog</a>
      </nav>
      <div class="language-switcher" aria-label="Language">
        <button type="button" data-lang="ja">JP</button>
        <button type="button" data-lang="en">EN</button>
        <button type="button" data-lang="zh">中文</button>
      </div>
    </header>

    <main class="page-shell">
      <section class="section gallery-section">
        <div class="section-heading reveal">
          <p class="eyebrow" data-i18n="travel.eyebrow">Travel</p>
          <h1 data-i18n="travel.title">旅の記録</h1>
        </div>
        <div class="photo-grid travel-grid">
          <button class="photo-card reveal" type="button" data-photo="travel1" data-title-ja="太平洋フェリーで仙台から名古屋に乗船" data-note-ja="酔い止めを持参しなかったので、結構キツい場面もあった">
            <img src="assets/travel1.jpg" alt="旅の写真 1" />
          </button>
          <button class="photo-card reveal" type="button" data-photo="travel2" data-title-ja="いわき市のアクアマリンふくしま" data-note-ja="土日だとこの水槽の目の前で寿司が食べれるらしい。">
            <img src="assets/travel2.jpg" alt="旅の写真 2" />
          </button>
          <button class="photo-card reveal" type="button" data-photo="travel3" data-title-ja="北海道稚内市の宗谷岬" data-note-ja="最果ての地で人もあまりいなくてとても良かった">
            <img src="assets/travel3.jpg" alt="旅の写真 3" />
          </button>
          <button class="photo-card reveal" type="button" data-photo="travel4" data-title-ja="イギリス南部のセブンシスターズ" data-note-ja="いっぱい歩いた。いい運動になった。">
            <img src="assets/travel4.jpg" alt="旅の写真 4" />
          </button>
          <button class="photo-card reveal" type="button" data-photo="travel5" data-title-ja="スコットランドのエディンバラ" data-note-ja="エディンバラの街並みが見渡せて絶景だった">
            <img src="assets/travel5.jpg" alt="旅の写真 5" />
          </button>
          <button class="photo-card reveal" type="button" data-photo="travel6" data-title-ja="タイのアユタヤ" data-note-ja="暑かった。遺跡に圧倒された。">
            <img src="assets/travel6.jpg" alt="旅の写真 6" />
          </button>
        </div>
      </section>
    </main>

    <dialog class="photo-dialog" aria-label="写真の説明">
      <button class="dialog-close" type="button" aria-label="閉じる">×</button>
      <h2 class="photo-dialog-title"></h2>
      <p class="photo-dialog-note"></p>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
