<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>travel | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Noto+Sans+JP:wght@400;500;700&family=Nunito:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas class="snow-canvas" aria-hidden="true"></canvas>
    <header class="site-header">
      <a class="brand" href="index.html">Portfolio</a>
      <nav class="site-nav" aria-label="メインナビゲーション">
        <a href="about.html">about</a>
        <a href="works.html">works</a>
        <a class="is-active" href="travel.html">travel</a>
        <a href="dog.html">dog</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="section gallery-section">
        <div class="section-heading reveal">
          <p class="eyebrow">Travel</p>
          <h1>旅の記録</h1>
        </div>
        <div class="photo-grid travel-grid">
          <button class="photo-card reveal" type="button" data-caption="太平洋フェリーで仙台から名古屋に乗船">
            <img src="assets/travel1.jpg" alt="北海道旅行写真 1" />
          </button>
          <button class="photo-card reveal" type="button" data-caption="いわき市のアクアマリンふくしま">
            <img src="assets/travel2.jpg" alt="北海道旅行写真 2" />
          </button>
          <button class="photo-card reveal" type="button" data-caption="北海道稚内市の宗谷岬">
            <img src="assets/travel3.jpg" alt="北海道旅行写真 3" />
          </button>
          <button class="photo-card reveal" type="button" data-caption="イギリス南部のセブンシスターズ">
            <img src="assets/travel4.jpg" alt="北海道旅行写真 4" />
          </button>
          <button class="photo-card reveal" type="button" data-caption="スコットランドのエディンバラ">
            <img src="assets/travel5.jpg" alt="北海道旅行写真 5" />
          </button>
          <button class="photo-card reveal" type="button" data-caption="タイのアユタヤ">
            <img src="assets/travel6.jpg" alt="北海道旅行写真 6" />
          </button>
        </div>
      </section>
    </main>

    <dialog class="photo-dialog" aria-label="写真の説明">
      <button class="dialog-close" type="button" aria-label="閉じる">×</button>
      <p></p>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
